apiVersion: v2
name: azathoth
description: Azathoth - Minecraft MMORPG Server Framework
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: postgresql.enabled
  - name: mongodb
    version: "16.x.x"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: mongodb.enabled
  - name: redis
    version: "20.x.x"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: redis.enabled
  - name: kafka
    version: "31.x.x"
    repository: "oci://registry-1.docker.io/bitnamicharts"
    condition: kafka.enabled
