apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "azathoth.fullname" . }}-config
  labels:
    {{- include "azathoth.labels" . | nindent 4 }}
data:
  # Database
  POSTGRES_HOST: {{ include "azathoth.fullname" . }}-postgresql
  POSTGRES_PORT: "5432"
  POSTGRES_DB: {{ .Values.postgresql.auth.database | default "azathoth" }}
  POSTGRES_USER: {{ .Values.postgresql.auth.username | default "azathoth" }}
  DATABASE_URL: "jdbc:postgresql://{{ include "azathoth.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database | default "azathoth" }}"

  # MongoDB
  MONGODB_HOST: {{ include "azathoth.fullname" . }}-mongodb
  MONGODB_PORT: "27017"
  MONGODB_DATABASE: {{ .Values.mongodb.auth.database | default "azathoth" }}
  MONGODB_URI: "mongodb://{{ include "azathoth.fullname" . }}-mongodb:27017/{{ .Values.mongodb.auth.database | default "azathoth" }}"

  # Redis
  REDIS_HOST: {{ include "azathoth.fullname" . }}-redis-master
  REDIS_PORT: "6379"
  REDIS_URL: "redis://{{ include "azathoth.fullname" . }}-redis-master:6379"

  # Kafka
  KAFKA_BROKERS: {{ include "azathoth.fullname" . }}-kafka:9092
  KAFKA_BOOTSTRAP_SERVERS: {{ include "azathoth.fullname" . }}-kafka:9092

  # Service discovery
  GATEWAY_GRPC_HOST: {{ include "azathoth.fullname" . }}-gateway
  GATEWAY_GRPC_PORT: "9090"
  PLAYER_SERVICE_HOST: {{ include "azathoth.fullname" . }}-player-service
  PLAYER_SERVICE_PORT: "9090"
