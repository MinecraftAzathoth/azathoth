apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: azathoth-admin-ingress
  namespace: azathoth
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: admin.azathoth.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: azathoth-admin-service
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: azathoth-admin-frontend
                port:
                  number: 80
